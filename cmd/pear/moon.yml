tasks:
  build:
    deps:
    - root:build
    # Builds and embeds the pre-rendered /ui/ pages (member login, instance
    # admin) into the pear binary via internal/webui/dist.
    - pear-pages:build
  dev:
    args:
      - --
      - --pds_oauth_client_uri
      - ${NGROK_DOMAIN}
    env:
      HABITAT_PORT: '8000'
      HABITAT_DEBUG: 'true'
      HABITAT_SERVICE_NAME: "habitat_local"
      HABITAT_DOMAIN: pear.local.habitat.network
      HABITAT_PRETTY_LOGS: 'true'
      HABITAT_FRONTEND_DOMAIN: frontend.local.habitat.network
      # Reverse-proxy /ui/ to the pear-pages dev server instead of serving the
      # embedded build, so UI changes are picked up live.
      HABITAT_UI_DEV_PROXY: 'http://localhost:6010'
      HABITAT_ADMIN_PASSWORD: 'password'
    deps:
    - root:caddy
    - ngrok
    - pear-pages:dev
  ngrok:
    # we ngrok for authing with the public pds. if it's not installed, just skip. pds auth won't work
    script: 'command -v ngrok >/dev/null 2>&1 && exec ngrok http "8000" --url "https://${NGROK_DOMAIN}" --log stdout || echo "[ngrok] not installed, skipping tunnel" >&2'
    preset: server
    options:
      envFile:
      - /dev.env
  docker-build:
    options:
      internal: false
      runInCI: true
  migration-create:
    command: goose create
    env:
      GOOSE_MIGRATION_DIR: migrations
    preset: utility
