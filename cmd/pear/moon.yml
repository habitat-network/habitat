tasks:
  build:
    deps:
    - root:build
  dev:
    args:
      - --
      - --pds_oauth_client_uri
      - ${NGROK_DOMAIN}
    env:
      HABITAT_PORT: '8000'
      HABITAT_DEBUG: 'true'
      HABITAT_SERVICE_NAME: "habitat_local"
      HABITAT_DOMAIN: pear.local.habitat.network
      HABITAT_PRETTY_LOGS: 'true'
      HABITAT_FRONTEND_DOMAIN: frontend.local.habitat.network
    deps:
    - root:caddy
    - ngrok
  ngrok:
    command: ngrok
    args:
      - http
      - "8000"
      - --url
      - https://${NGROK_DOMAIN}
      - --log
      - stdout
    preset: server
    options:
      envFile:
      - /dev.env
  docker-build:
    options:
      internal: false
      runInCI: true
  migration-create:
    command: goose create
    env:
      GOOSE_MIGRATION_DIR: migrations
    preset: utility
