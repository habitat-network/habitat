tasks:
  build:
    deps:
    - root:build
  dev:
    args:
    - --
    - --domain
    - local.habitat.network
    env:
      HABITAT_PORT: '8000'
      HABITAT_DEBUG: 'true'
      HABITAT_SERVICE_NAME: "habitat_local"
      DEBUG: 'true'
      DATABASE_URL: "postgres://habitat:habitat@localhost:5432/habitat"
    deps:
    - postgres
    - caddy
    # - target: funnel:start
    #   args:
    #   - '8000'
    #   - pear
  postgres:
    command: docker-compose -f ../../infra/docker-compose.yml up
    preset: server
  docker-build:
    options:
      internal: false
  caddy:
    command: caddy run --config Caddyfile
    preset: server
docker:
  file:
    buildTask: build
    startTask: start
