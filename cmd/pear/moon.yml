tasks:
  build:
    deps:
    - root:build
  dev:
    args:
      - --
      - --pds_oauth_client_uri
      - oauth-client-metadata.${TS_DOMAIN}
    env:
      HABITAT_PORT: '8000'
      HABITAT_DEBUG: 'true'
      HABITAT_SERVICE_NAME: "habitat_local"
      DEBUG: 'true'
      DATABASE_URL: "postgres://habitat:habitat@localhost:5432/habitat"
      HABITAT_DOMAIN: pear.local.habitat.network
    deps:
    - postgres
    - root:caddy
    - target: oauth_client_metadata:start
      env:
        HABITAT_DOMAIN: pear.local.habitat.network
  postgres:
    command: docker-compose -f ../../infra/docker-compose.yml up
    preset: server
    options:
      internal: true
  docker-build:
    options:
      internal: false
      runInCI: true
  migration-create:
    command: goose create
    env:
      GOOSE_MIGRATION_DIR: migrations
    preset: utility
