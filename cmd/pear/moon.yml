tasks:
  build:
    deps:
    - root:build
  dev:
    env:
      HABITAT_PORT: '8000'
      HABITAT_DEBUG: 'true'
      HABITAT_SERVICE_NAME: "habitat_local"
      DEBUG: 'true'
      DATABASE_URL: "postgres://habitat:habitat@localhost:5432/habitat"
      HABITAT_DOMAIN: pear.local.habitat.network
    deps:
    - postgres
    - root:caddy
  postgres:
    command: docker-compose -f ../../infra/docker-compose.yml up
    preset: server
    options:
      internal: true
  docker-build:
    options:
      internal: false
      runInCI: true
