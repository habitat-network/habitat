layer: library
fileGroups:
  internal_src:
    - internal/**/*.go
    - '!internal/**/*_test.go'
  internal_test:
    - internal/**/*.go
tasks:
  build:
    inputs:
      - '@group(mod)'
      - '@group(internal_src)'
  test:
    inputs:
      - '@group(mod)'
      - '@group(internal_test)'
  format-check:
    command: golangci-lint fmt -d
    inputs:
    - /**/*.go
  format:
    command: golangci-lint fmt
    inputs:
    - /**/*.go
    preset: server
  lint-check:
    command: golangci-lint run
    inputs:
    - /**/*.go
  caddy:
    command: caddy
    args:
    - run
    - --config
    - '@in(0)'
    inputs:
    - Caddyfile
    preset: server
