layer: library
fileGroups:
  src:
    - internal/**/*.go
    - '!internal/**/*_test.go'
  test:
    - internal/**/*_test.go
tasks:
  format-check:
    command: golangci-lint fmt -d
    inputs:
    - /**/*.go
  format:
    command: golangci-lint fmt
    inputs:
    - /**/*.go
    preset: server
  lint-check:
    command: golangci-lint run
    inputs:
    - /**/*.go
  caddy:
    command: caddy
    args:
    - run
    - --config
    - '@in(0)'
    inputs:
    - Caddyfile
    preset: server
