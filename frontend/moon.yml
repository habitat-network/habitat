tasks:
  dev:
    env:
      HABITAT_DOMAIN: pear.local.habitat.network
      DOMAIN: frontend.local.habitat.network
    deps:
      - target: pear:dev
        env:
          HABITAT_FRONTEND_DOMAIN: frontend.local.habitat.network
      - root:caddy
  docker-build:
    deps:
      - target: build
        env:
          HABITAT_DOMAIN: pear.habitat
          DOMAIN: frontend.habitat
    options:
      internal: false
  dev-all:
    deps:
      - target: ~:dev
      - target: greensky:dev
      - target: calendar:dev
      - target: docs:dev
    options:
      persistent: true
      runInCI: false
  gh-pages:
    deps:
      - target: ~:build
      - target: calendar:build
        env:
          DOMAIN: ${DOMAIN}/calendar
          OUT_DIR: $projectRoot/dist/calendar
      - target: greensky:build
        env:
          DOMAIN: ${DOMAIN}/greensky
          OUT_DIR: $projectRoot/dist/greensky
      - target: docs:build
        env:
          DOMAIN: ${DOMAIN}/docs
          OUT_DIR: $projectRoot/dist/docs
      - target: api-docs:build
        env:
          BASE_URL: /habitat/api/
          OUT_DIR: $projectRoot/dist/api
    options:
      runDepsInParallel: false
      cache: false
