tasks:
  dev:
    env:
      VITE_HABITAT_DOMAIN: pear.local.habitat.network
      # Client-visible origin. Separate from BASE_URL because Vite forces a
      # fully-qualified `base` back to "/" in dev, so import.meta.env.BASE_URL
      # can't carry the origin.
      VITE_BASE_URL: https://frontend.local.habitat.network
      # DID of the home server; injected as the __HOME_SERVER_DID__ Vite define
      # so the groups UI can target it via the Atproto-Proxy header.
      HOME_SERVER_DID: did:web:home.local.habitat.network
    deps:
      - pear:dev
      - root:caddy
      - search:dev
      - home:dev
  docker-build:
    deps:
      - target: build
        env:
          VITE_HABITAT_DOMAIN: pear.habitat
    options:
      internal: false
  dev-all:
    deps:
      - target: ~:dev
      - target: docs:dev
    options:
      persistent: true
      runInCI: false
  gh-pages:
    deps:
      - target: ~:build
      - target: docs:build
        env:
          VITE_BASE_URL: ${DOMAIN}/docs
          OUT_DIR: $projectRoot/dist/docs
      - target: api-docs:build
        env:
          BASE_URL: /habitat/api/
          OUT_DIR: $projectRoot/dist/api
    options:
      runDepsInParallel: false
      cache: false
