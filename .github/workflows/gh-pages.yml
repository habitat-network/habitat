# derived from https://vite.dev/guide/static-deploy.html#github-pages
name: Github Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .prototools
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: moon r frontend:gh-pages
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          HABITAT_DOMAIN: ${{ vars.HABITAT_DOMAIN }}
          HASH_ROUTING: true

      - name: Generate OpenAPI spec
        run: pnpm --filter xrpc-openapi-gen run generate

      - name: Generate API doc pages
        run: pnpm --filter api-docs run gen-api-docs

      - name: Build API docs
        run: pnpm --filter api-docs run build
        env:
          BASE_URL: /habitat/api/

      - name: Merge API docs into frontend dist
        run: mkdir -p frontend/dist/api && cp -r api-docs/build/. frontend/dist/api/

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload dist folder
          path: "./frontend/dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
