name: Renovate

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: renovatebot/github-action@v42.0.0
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
