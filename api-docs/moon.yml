tasks:
  generate:
    command: pnpm
    args: gen-api-docs
    deps:
      - xrpc-openapi-gen:generate
    outputs:
      - docs/api
    options:
      mergeDeps: replace
      mergeArgs: replace
      runInCI: skip
  dev:
    command: pnpm
    args: start
    deps:
      - generate
    options:
      persistent: true
      mergeDeps: replace
      mergeArgs: replace
  build:
    deps:
      - generate
    outputs:
      - build
    options:
      mergeDeps: replace
      mergeOutputs: replace
