tasks:
  dev:
    command: pnpm
    args: start
    deps:
      - xrpc-openapi-gen:generate
    options:
      persistent: true
      mergeDeps: replace
      mergeArgs: replace
  build:
    deps:
      - xrpc-openapi-gen:generate
    outputs:
      - build
    options:
      mergeDeps: replace
      mergeOutputs: replace
