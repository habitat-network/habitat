layer: application
language: typescript
tasks:
  dev:
    env:
      DOCS_SERVER_PORT: "2590"
      DOCS_SERVER_DOMAIN: "docs-server.local.habitat.network"
      # Trust the macOS system keychain (where Caddy's `tls internal` installs its
      # root CA) so the Node server's HTTPS calls to pear and to member did:web
      # docs succeed in local dev.
      NODE_OPTIONS: "--use-system-ca"
      # sap's internal port (2581) serves the /proxy (authenticated pear calls),
      # /org/add + /org/list (org bootstrap/lookup) and /channel (outbox
      # websocket) endpoints. Reached directly, not via Caddy/TLS.
      DOCS_SERVER_SAP_URL: "http://127.0.0.1:2581"
      # Origin of the docsv2 frontend, allowed to make credentialed (cookie)
      # cross-origin requests. docsv2 authenticates with the server-session
      # cookie this server sets on its own domain.
      DOCS_SERVER_APP_ORIGIN: "https://docsv2.local.habitat.network"
    deps:
      - pear:dev
      - sap:dev
      - root:caddy
