layer: application
language: typescript
tasks:
  dev:
    env:
      DOCS_SERVER_PORT: "2590"
      DOCS_SERVER_DOMAIN: "docs-server.local.habitat.network"
      # Trust the macOS system keychain (where Caddy's `tls internal` installs its
      # root CA) so the Node server's HTTPS calls to pear and to member did:web
      # docs succeed in local dev.
      NODE_OPTIONS: "--use-system-ca"
      # sap's internal port (2581) serves the /proxy (authenticated pear calls),
      # /org/add (OAuth bootstrap) and /channel (outbox websocket) endpoints.
      # Reached directly, not via Caddy/TLS.
      DOCS_SERVER_SAP_URL: "http://127.0.0.1:2581"
    deps:
      - pear:dev
      - sap:dev
      - root:caddy
