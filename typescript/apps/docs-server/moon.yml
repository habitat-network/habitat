layer: application
language: typescript
tasks:
  dev:
    env:
      DOCS_SERVER_PORT: "2590"
      DOCS_SERVER_DOMAIN: "docs-server.local.habitat.network"
      # Org handle the docs server authenticates as. The org identity owns the
      # docs space and the canonical records, and shares them with members.
      DOCS_SERVER_ORG_HANDLE: "acmecorp.pear.local.habitat.network"
      DOCS_SERVER_PEAR_HOST: "pear.local.habitat.network"
      # Trust the macOS system keychain (where Caddy's `tls internal` installs its
      # root CA) so the Node server's HTTPS calls to pear and to member did:web
      # docs succeed in local dev.
      NODE_OPTIONS: "--use-system-ca"
      # sap's internal port (2581) serves the /channel outbox websocket the
      # crawler subscribes to. It is reached directly (not via Caddy/TLS).
      DOCS_SERVER_SAP_URL: "ws://127.0.0.1:2581/channel"
    deps:
      - pear:dev
      - sap:dev
      - root:caddy
